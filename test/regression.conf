# Configuration for pg_orca regression tests

shared_preload_libraries = 'pg_orca'
pg_orca.enable_orca = on

# Prevent doubly-correlated subqueries (O(N³) SubPlans) from hanging tests.
# ORCA cannot decorrelate skip-level correlations in EXISTS/NOT EXISTS and
# falls back to nested correlated SubPlans, same as Cloudberry does.
statement_timeout = '30s'
